<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem Absensi — Frontend</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 0 auto; padding: 2rem; }
    .nav { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .nav a { padding: 0.5rem 1rem; background: #eee; border-radius: 4px; text-decoration: none; color: #333; }
    .nav a:hover { background: #ddd; }
    .soal { display: none; }
    .soal.active { display: block; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; }
    tr:hover { background: #f9f9f9; }
    form { max-width: 480px; }
    label, select, input, textarea, button { display: block; width: 100%; margin-bottom: 0.75rem; }
    button { padding: 0.5rem; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0052a3; }
    .error { color: #cc0000; font-size: 0.875rem; }
    .success { background: #d4edda; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .badge-present { background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 4px; }
    .badge-late { background: #fff3cd; color: #856404; padding: 2px 8px; border-radius: 4px; }
    .badge-absent { background: #f8d7da; color: #721c24; padding: 2px 8px; border-radius: 4px; }
    .badge-leave { background: #cce5ff; color: #004085; padding: 2px 8px; border-radius: 4px; }
    .inactive { opacity: 0.6; font-style: italic; }
  </style>
</head>
<body>
  <h1>🧾 Sistem Absensi Karyawan</h1>
  <nav class="nav" id="nav"></nav>
  <div id="app"></div>
  <script type="module" src="/frontend/main.ts"></script>
</body>
</html>
